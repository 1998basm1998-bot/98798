<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مهيئ صور متجر Google Play الاحترافي</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f172a;
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(30, 41, 59, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 35px;
            width: 100%;
            max-width: 950px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 26px;
            color: #38bdf8;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .header p {
            font-size: 14px;
            color: #94a3b8;
        }

        .upload-section {
            border: 2px dashed #38bdf8;
            background: rgba(56, 189, 248, 0.05);
            border-radius: 16px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 25px;
        }

        .upload-section:hover {
            background: rgba(56, 189, 248, 0.1);
            border-color: #0ea5e9;
        }

        .upload-section svg {
            width: 50px;
            height: 50px;
            fill: #38bdf8;
            margin-bottom: 15px;
        }

        .upload-section p {
            font-size: 16px;
            color: #cbd5e1;
        }

        #fileInput {
            display: none;
        }

        .controls-panel {
            display: none;
            background: rgba(15, 23, 42, 0.6);
            padding: 15px 20px;
            border-radius: 12px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            justify-content: center;
            gap: 20px;
            align-items: center;
        }

        .controls-panel label {
            font-size: 14px;
            color: #cbd5e1;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .workspace {
            display: none;
            grid-template-columns: 1fr;
            gap: 25px;
        }

        @media (min-width: 768px) {
            .workspace {
                grid-template-columns: 1fr 1fr;
            }
        }

        .card {
            background: #1e293b;
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card h3 {
            font-size: 16px;
            color: #f1f5f9;
            margin-bottom: 15px;
            width: 100%;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 10px;
            text-align: center;
        }

        .preview-container {
            width: 100%;
            height: 220px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0f172a;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .preview-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .btn {
            background: linear-gradient(135deg, #0ea5e9, #2563eb);
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            text-align: center;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(37, 99, 235, 0.4);
        }

        .badge {
            background: rgba(56, 189, 248, 0.15);
            color: #38bdf8;
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 12px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>مُهيئ صور متجر Google Play المطور 🛠️</h1>
            <p>معالجة ذكية للألوان الخلفية لمنع ظهور الفواصل غير المتناسقة على المتجر</p>
        </div>

        <div class="upload-section" onclick="document.getElementById('fileInput').click()">
            <svg viewBox="0 0 24 24">
                <path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"/>
            </svg>
            <p>اضغط هنا لرفع الصورة الأصلية</p>
            <input type="file" id="fileInput" accept="image/*">
        </div>

        <div class="controls-panel" id="controlsPanel">
            <span style="font-size: 14px; color: #94a3b8;">نمط المعالجة:</span>
            <label>
                <input type="radio" name="resizeMode" value="fit" checked>
                احتواء ذكي (دمج وتمديد لون الحواف تلقائياً) ✨
            </label>
            <label>
                <input type="radio" name="resizeMode" value="crop">
                قص مركزي كامل (ملء الإطار بالكامل)
            </label>
        </div>

        <div class="workspace" id="workspace">
            <div class="card">
                <h3>أيقونة المتجر (App Icon)</h3>
                <span class="badge">512 × 512 بكسل</span>
                <div class="preview-container">
                    <img id="iconPreview" alt="معاينة الأيقونة">
                </div>
                <button class="btn" id="downloadIcon">تحميل الأيقونة الجاهزة ✅</button>
            </div>

            <div class="card">
                <h3>الرسم المميز (Feature Graphic)</h3>
                <span class="badge">1024 × 500 بكسل</span>
                <div class="preview-container">
                    <img id="featurePreview" alt="معاينة الرسم المميز">
                </div>
                <button class="btn" id="downloadFeature">تحميل الرسم المميز الجاهز ✅</button>
            </div>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const workspace = document.getElementById('workspace');
        const controlsPanel = document.getElementById('controlsPanel');
        const iconPreview = document.getElementById('iconPreview');
        const featurePreview = document.getElementById('featurePreview');
        const radioModes = document.querySelectorAll('input[name="resizeMode"]');

        let originalImage = null;

        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                originalImage = new Image();
                originalImage.onload = function() {
                    controlsPanel.style.display = 'flex';
                    workspace.style.display = 'grid';
                    processImages();
                };
                originalImage.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        radioModes.forEach(radio => {
            radio.addEventListener('change', () => {
                if (originalImage) processImages();
            });
        });

        function processImages() {
            const mode = document.querySelector('input[name="resizeMode"]:checked').value;
            iconPreview.src = resizeImage(originalImage, 512, 512, mode);
            featurePreview.src = resizeImage(originalImage, 1024, 500, mode);
        }

        function resizeImage(img, targetWidth, targetHeight, mode) {
            const canvas = document.createElement('canvas');
            canvas.width = targetWidth;
            canvas.height = targetHeight;
            const ctx = canvas.getContext('2d');

            const imgRatio = img.width / img.height;
            const targetRatio = targetWidth / targetHeight;

            if (mode === 'crop') {
                let sx, sy, sWidth, sHeight;
                if (imgRatio > targetRatio) {
                    sHeight = img.height;
                    sWidth = img.height * targetRatio;
                    sx = (img.width - sWidth) / 2;
                    sy = 0;
                } else {
                    sWidth = img.width;
                    sHeight = img.width / targetRatio;
                    sx = 0;
                    sy = (img.height - sHeight) / 2;
                }
                ctx.drawImage(img, sx, sy, sWidth, sHeight, 0, 0, targetWidth, targetHeight);
            } else if (mode === 'fit') {
                // تكتيك برمجى ذكي: استخراج لون حافة الصورة الأصلية لمنع التباين
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = img.width;
                tempCanvas.height = img.height;
                const tempCtx = tempCanvas.getContext('2d');
                tempCtx.drawImage(img, 0, 0);
                
                // أخذ عينة لون من بكسل علوي جانبي
                const pixelData = tempCtx.getImageData(Math.floor(img.width / 2), 5, 1, 1).data;
                ctx.fillStyle = `rgba(${pixelData[0]}, ${pixelData[1]}, ${pixelData[2]}, ${pixelData[3] / 255})`;
                ctx.fillRect(0, 0, targetWidth, targetHeight);

                let renderWidth, renderHeight;
                if (imgRatio > targetRatio) {
                    renderWidth = targetWidth;
                    renderHeight = targetWidth / imgRatio;
                } else {
                    renderHeight = targetHeight;
                    renderWidth = targetHeight * imgRatio;
                }

                const x = (targetWidth - renderWidth) / 2;
                const y = (targetHeight - renderHeight) / 2;
                
                ctx.drawImage(img, 0, 0, img.width, img.height, x, y, renderWidth, renderHeight);
            }

            return canvas.toDataURL('image/png');
        }

        document.getElementById('downloadIcon').addEventListener('click', () => {
            triggerDownload(iconPreview.src, 'app-icon-512x512.png');
        });

        document.getElementById('downloadFeature').addEventListener('click', () => {
            triggerDownload(featurePreview.src, 'feature-graphic-1024x500.png');
        });

        function triggerDownload(dataUrl, filename) {
            const a = document.createElement('a');
            a.href = dataUrl;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }
    </script>
</body>
</html>
